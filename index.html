<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love! 🎂❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at top right, #ffe5ec, #ffc2d1, #ffb3c6);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            padding: 40px 20px;
        }
        
        /* Grand Main Layout */
        .main-wrapper {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 50px 40px;
            box-shadow: 0 25px 60px rgba(255, 74, 121, 0.2);
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #c9184a;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #590d22;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* --- Section 1: The Interactive Cake --- */
        .cake-section {
            margin-bottom: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .cake {
            position: relative;
            width: 180px;
            height: 120px;
            background: #f1c40f;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 8px 0 #d4ac0d, inset 0 10px 0 #fff;
            margin-top: 50px;
            transition: all 0.5s ease;
        }
        .cake::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 0;
            width: 180px;
            height: 20px;
            background: #e74c3c;
            box-shadow: 0 6px 0 #c0392b;
        }
        .cake::after {
            content: '';
            position: absolute;
            top: 80px;
            left: 0;
            width: 180px;
            height: 20px;
            background: #2ecc71;
            box-shadow: 0 6px 0 #27ae60;
        }
        
        /* Candle & Flame */
        .candle {
            position: absolute;
            top: -35px;
            left: 82px;
            width: 16px;
            height: 35px;
            background: linear-gradient(to right, #3498db, #2980b9);
            border-radius: 4px 4px 0 0;
        }
        .flame {
            position: absolute;
            top: -20px;
            left: 3px;
            width: 10px;
            height: 20px;
            background: #e67e22;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: moveFlame 0.5s infinite alternate;
            box-shadow: 0 0 15px #f39c12;
            cursor: pointer;
        }
        
        @keyframes moveFlame {
            0% { transform: skewX(-5deg) scale(1); }
            100% { transform: skewX(5deg) scale(1.1); }
        }

        .cake-btn {
            margin-top: 30px;
            background: #23a6d5;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(35, 166, 213, 0.3);
            transition: 0.3s;
        }
        .cake-btn:hover { background: #157ea3; }

        /* --- Section 2: The Original Surprises Box --- */
        .surprise-section {
            border-top: 2px dashed rgba(201, 24, 74, 0.3);
            padding-top: 50px;
            width: 100%;
        }

        .surprise-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 550px;
            margin: 0 auto;
        }

        .surprise-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #fff5f7;
            border-left: 6px solid #ff4081;
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .surprise-box p {
            font-size: 1.15rem;
            font-style: italic;
            color: #333;
            line-height: 1.6;
        }

        /* Grand Button */
        .heart-btn {
            background: linear-gradient(45deg, #ff4081, #ec407a);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.4);
            transition: all 0.3s ease;
            outline: none;
            margin-top: 15px;
        }
        .heart-btn:hover {
            background: linear-gradient(45deg, #f50057, #d81b60);
            transform: scale(1.05);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 3.5s linear forwards;
            opacity: 0;
            bottom: -20px;
            z-index: 999;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.3rem; }
            .main-wrapper { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>Happy Birthday, My Queen! 👑</h1>
        <div class="subtitle">Welcome to Your Grand Birthday Dashboard</div>

        <!-- 🎂 CAKE SECTION -->
        <div class="cake-section">
            <h2 style="color: #a4133c; font-family: 'Playfair Display', serif; margin-bottom: 10px;">Make a Wish & Blow the Candle!</h2>
            
            <div class="cake" id="birthday-cake">
                <div class="candle" id="candle">
                    <div class="flame" id="flame" onclick="blowCandle()"></div>
                </div>
            </div>
            
            <button class="cake-btn" id="cake-status-btn" onclick="blowCandle()">Blow Candle 🕯️</button>
        </div>

        <!-- 🎁 SURPRISES SECTION (All 5 original surprises brought back together) -->
        <div class="surprise-section">
            <div class="surprise-container">
                <h2 id="main-heading" style="color: #d81b60; margin-bottom: 15px;">Your Surprises Box ✨</h2>
                <p id="sub-text">Click the premium button below to step into a journey made of 5 beautiful hidden notes just for you...</p>
                
                <button class="heart-btn" id="action-btn" onclick="nextSurprise()">Unlock Surprise! ❤️</button>

                <div class="surprise-box" id="surprise-text">
                    <!-- Dynamic Messages load here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🎂 Cake Logic
        let candleLit = true;
        function blowCandle() {
            const flame = document.getElementById('flame');
            const btn = document.getElementById('cake-status-btn');
            const cake = document.getElementById('birthday-cake');
            
            if (candleLit) {
                flame.style.display = 'none';
                btn.innerText = "Cake Successfully Cut! 🍰";
                btn.style.background = '#2ecc71';
                candleLit = false;
                // Burst effects on blowing candle
                triggerGrandEffects(['🎉', '🎂', '✨', '🎈', '🥳']);
            } else {
                flame.style.display = 'block';
                btn.innerText = "Blow Candle 🕯️";
                btn.style.background = '#23a6d5';
                candleLit = true;
            }
        }

        // 🎁 Surprises Logic (All 5 Original Premium Surprises)
        let stage = 0;
        const surprises = [
            {
                heading: "Surprise #1: The Reality Check 💖",
                text: "Ever since you walked into my life, everything became ten times brighter. You have the most magical smile, and it's officially my absolute favorite thing in the universe!",
                btnText: "Keep Going! 👉"
            },
            {
                heading: "Surprise #2: A Pinky Promise 🤝",
                text: "I promise to stand by you through every single laugh, every silly argument, and all the crazy adventures. (And yes, I promise to let you win most of the arguments! 😉)",
                btnText: "Click For More! 🌟"
            },
            {
                heading: "Surprise #3: The Mood Lifter 🍦",
                text: "No matter how tough a day gets, just one text or call from you completely resets my mood. You are literally my human version of hot chocolate on a cold day!",
                btnText: "Next Secret! 🔑"
            },
            {
                heading: "Surprise #4: Total Monopoly 👑",
                text: "Today you have 100% free passes! You can demand your favorite food, make me watch any movie you want, and I will gladly be your personal assistant for the day!",
                btnText: "The Final Surprise! 🎁"
            },
            {
                heading: "🎉 HAPPY BIRTHDAY, MY LOVE! 🎉",
                text: "May this year bring you endless happiness, laughter, and all the success you deserve. Thank you for being your amazing self. Let's make today unforgettable! 🎂🎈✨",
                btnText: "Start Over! 🔄"
            }
        ];

        function nextSurprise() {
            const box = document.getElementById('surprise-text');
            const heading = document.getElementById('main-heading');
            const subText = document.getElementById('sub-text');
            const btn = document.getElementById('action-btn');

            subText.style.display = 'none';
            
            if (stage < surprises.length) {
                box.style.display = 'block';
                heading.innerText = surprises[stage].heading;
                box.innerHTML = `<p>${surprises[stage].text}</p>`;
                btn.innerText = surprises[stage].btnText;
                
                // Burst elegant particles on every single next click
                triggerGrandEffects(['❤️', '💖', '✨', '🎉', '🌸']);
                stage++;
            } else {
                stage = 0;
                heading.innerText = "Your Surprises Box ✨";
                subText.style.display = 'block';
                box.style.display = 'none';
                btn.innerText = "Unlock Surprise! ❤️";
            }
        }

        // Particle System
        function triggerGrandEffects(emojis) {
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 1.5 + 2) + 's'; 
                particle.style.fontSize = (Math.random() * 25 + 15) + 'px'; 
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 3500);
            }
        }
    </script>
</body>
</html>
